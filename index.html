<!DOCTYPE html>
<html>
<head>
  <title>Trading Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; text-align:center;">

  <h2>Khan Trader Panel</h2>

  <h3 id="balance">Demo Balance: $5000</h3>

  <button onclick="increaseBalance()">Increase Balance</button>
  <button onclick="decreaseBalance()">Decrease Balance</button>

  <script>
    let balance = 5000;

    function updateUI() {
      document.getElementById("balance").innerText = "Demo Balance: $" + balance;
    }

    function increaseBalance() {
      balance += 1000;
      updateUI();
    }

    function decreaseBalance() {
      balance -= 1000;
      updateUI();
    }
  </script>

</body>
</html>
